apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: operator-webhook
    app.kubernetes.io/name: knative-operator
    app.kubernetes.io/version: 1.11.0
    role: operator-webhook
  name: operator-webhook
  namespace: knative-operator
spec:
  ports:
  - name: http-metrics
    port: 9090
    targetPort: 9090
  - name: http-profiling
    port: 8008
    targetPort: 8008
  - name: https-webhook
    port: 443
    targetPort: 8443
  selector:
    role: operator-webhook
