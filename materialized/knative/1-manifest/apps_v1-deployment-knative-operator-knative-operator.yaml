apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: knative-operator
    app.kubernetes.io/version: 1.11.0
  name: knative-operator
  namespace: knative-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: knative-operator
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: knative-operator
        app.kubernetes.io/version: 1.11.0
        name: knative-operator
    spec:
      containers:
      - env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SYSTEM_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: METRICS_DOMAIN
          value: knative.dev/operator
        - name: CONFIG_LOGGING_NAME
          value: config-logging
        - name: CONFIG_OBSERVABILITY_NAME
          value: config-observability
        image: gcr.io/knative-releases/knative.dev/operator/cmd/operator@sha256:0a3b5b4e84b8a97fc18826db74f4c3e615b8543a35e85d75c9fd2e8549286c23
        imagePullPolicy: IfNotPresent
        name: knative-operator
        ports:
        - containerPort: 9090
          name: metrics
      serviceAccountName: knative-operator
