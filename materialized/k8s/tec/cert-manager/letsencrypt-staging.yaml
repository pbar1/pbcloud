apiVersion: "cert-manager.io/v1"
kind: "ClusterIssuer"
metadata:
  annotations:
    tanka.dev/namespaced: "false"
  name: "letsencrypt-staging"
spec:
  acme:
    email: "${EMAIL}"
    privateKeySecretRef:
      name: "letsencrypt-staging"
    server: "https://acme-staging-v02.api.letsencrypt.org/directory"
    solvers:
    - dns01:
        cloudflare:
          apiKeySecretRef:
            key: "CF_API_KEY"
            name: "cloudflare-creds"
          email: "${EMAIL}"
      selector:
        dnsZones:
        - "${DOMAIN}"