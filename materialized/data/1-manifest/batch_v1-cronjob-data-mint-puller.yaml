apiVersion: batch/v1
kind: CronJob
metadata:
  name: mint-puller
  namespace: data
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - command:
            - sh
            - -c
            - mintapi $MINT_USERNAME $MINT_PASSWORD --mfa-method=soft-token --mfa-token=$MINT_MFA_TOKEN
              --headless --use-chromedriver-on-path --limit=10000 --format=json --transactions
              | gzip > /data/transactions.$(date +%s).json.gz
            envFrom:
            - secretRef:
                name: mintapi
            image: ghcr.io/mintapi/mintapi:latest
            name: mintapi
            volumeMounts:
            - mountPath: /data
              name: data
          restartPolicy: Never
          securityContext:
            fsGroup: 100
          volumes:
          - hostPath:
              path: /data/general/mint
            name: data
  schedule: 30 14 * * *
