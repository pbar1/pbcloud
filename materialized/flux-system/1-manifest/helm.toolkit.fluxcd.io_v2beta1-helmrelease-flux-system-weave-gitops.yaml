apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  chart:
    spec:
      chart: weave-gitops
      sourceRef:
        kind: HelmRepository
        name: weaveworks
  interval: 24h
  values:
    adminUser:
      create: true
      passwordHash: $2a$10$HPvsbsbVWfB37dHTpL1k0eDlPqWitfmz168cQlI/PWpBLmxyNOKRW
      username: admin
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        ingress.kubernetes.io/force-ssl-redirect: "true"
      enabled: true
      hosts:
      - host: gitops.xnauts.net
        paths:
        - path: /
          pathType: Prefix
      tls:
      - hosts:
        - gitops.xnauts.net
        secretName: gitops-tls
    podAnnotations:
      operator.1password.io/item-name: oidc-auth
      operator.1password.io/item-path: vaults/pbcloud/items/auth0
