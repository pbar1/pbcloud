apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: xnauts-net-tls
  namespace: cert-manager
spec:
  commonName: '*.xnauts.net'
  dnsNames:
  - '*.xnauts.net'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: xnauts-net-tls
