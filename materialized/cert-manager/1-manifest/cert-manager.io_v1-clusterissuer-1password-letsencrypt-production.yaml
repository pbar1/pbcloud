apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
  namespace: 1password
spec:
  acme:
    email: piercebartine@gmail.com
    privateKeySecretRef:
      name: letsencrypt-production
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - dns01:
        cloudflare:
          apiKeySecretRef:
            key: CF_API_KEY
            name: cloudflare-creds
          email: piercebartine@gmail.com
      selector:
        dnsZones:
        - xnauts.net
