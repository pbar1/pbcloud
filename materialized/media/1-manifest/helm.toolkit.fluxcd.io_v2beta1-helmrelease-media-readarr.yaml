apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"helm.toolkit.fluxcd.io/v2beta1","kind":"HelmRelease","metadata":{"labels":{"app.kubernetes.io/managed-by":"pulumi"},"name":"readarr","namespace":"media"},"spec":{"chart":{"spec":{"chart":"readarr","reconcileStrategy":"ChartVersion","sourceRef":{"kind":"HelmRepository","name":"geek-cookbook","namespace":"flux-system"},"version":"*"}},"interval":"24h","values":{"env":{"PGID":"100","PUID":"1000","TZ":"America/Los_Angeles"},"image":{"imagePullPolicy":"Always","repository":"ghcr.io/linuxserver/readarr","tag":"develop"},"ingress":{"main":{"annotations":{"cert-manager.io/cluster-issuer":"letsencrypt-production","traefik.ingress.kubernetes.io/router.entrypoints":"websecure"},"enabled":true,"hosts":[{"host":"readarr.xnauts.net","paths":[{"path":"/","pathType":"Prefix"}]}],"tls":[{"hosts":["readarr.xnauts.net"],"secretName":"readarr-tls"}]}},"persistence":{"config":{"enabled":true,"hostPath":"/data/general/config/readarr","mountPath":"/config","type":"hostPath"},"downloads":{"enabled":true,"hostPath":"/data/torrents","mountPath":"/downloads","type":"hostPath"},"media":{"enabled":true,"hostPath":"/data/media/audiobooks","mountPath":"/audiobooks","type":"hostPath"}},"podAnnotations":{"container.apparmor.security.beta.kubernetes.io/readarr":"unconfined"},"podSecurityContext":{"capabilities":{"drop":["all"]},"fsGroup":"100","fsGroupChangePolicy":"OnRootMismatch","seccompProfile":{"type":"RuntimeDefault"}}}}}
  labels:
    app.kubernetes.io/managed-by: pulumi
  name: readarr
  namespace: media
spec:
  chart:
    spec:
      chart: readarr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
      version: '*'
  interval: 24h
  values:
    env:
      PGID: "100"
      PUID: "1000"
      TZ: America/Los_Angeles
    image:
      imagePullPolicy: Always
      repository: ghcr.io/linuxserver/readarr
      tag: develop
    ingress:
      main:
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        enabled: true
        hosts:
        - host: readarr.xnauts.net
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - readarr.xnauts.net
          secretName: readarr-tls
    persistence:
      config:
        enabled: true
        hostPath: /data/general/config/readarr
        mountPath: /config
        type: hostPath
      downloads:
        enabled: true
        hostPath: /data/torrents
        mountPath: /downloads
        type: hostPath
      media:
        enabled: true
        hostPath: /data/media/audiobooks
        mountPath: /audiobooks
        type: hostPath
    podAnnotations:
      container.apparmor.security.beta.kubernetes.io/readarr: unconfined
    podSecurityContext:
      capabilities:
        drop:
        - all
      fsGroup: "100"
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
