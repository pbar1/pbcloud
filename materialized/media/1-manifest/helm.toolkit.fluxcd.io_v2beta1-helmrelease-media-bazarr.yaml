apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: bazarr
  namespace: media
spec:
  chart:
    spec:
      chart: bazarr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
      version: '*'
  interval: 24h
  values:
    env:
      PGID: 100
      PUID: 1000
      TZ: America/Los_Angeles
    image:
      imagePullPolicy: Always
      repository: ghcr.io/linuxserver/bazarr
      tag: latest
    ingress:
      main:
        enabled: false
    persistence:
      config:
        enabled: true
        hostPath: /zssd/general/config/bazarr
        mountPath: /config
        type: hostPath
      movies:
        enabled: true
        hostPath: /data/media/movies
        mountPath: /movies
        type: hostPath
      tv:
        enabled: true
        hostPath: /data/media/tv
        mountPath: /tv
        type: hostPath
    podAnnotations:
      container.apparmor.security.beta.kubernetes.io/bazarr: unconfined
    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      capabilities: {}
