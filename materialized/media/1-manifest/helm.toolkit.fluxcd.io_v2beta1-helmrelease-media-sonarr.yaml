apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  chart:
    spec:
      chart: sonarr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
      version: '*'
  interval: 24h
  values:
    env:
      PGID: 100
      PUID: 1000
      TZ: America/Los_Angeles
    image:
      imagePullPolicy: Always
      repository: ghcr.io/linuxserver/sonarr
      tag: latest
    ingress:
      main:
        enabled: false
    persistence:
      config:
        enabled: true
        hostPath: /data/general/config/sonarr
        mountPath: /config
        type: hostPath
      downloads:
        enabled: true
        hostPath: /data/torrents
        mountPath: /downloads
        type: hostPath
      media:
        enabled: true
        hostPath: /data/media/tv
        mountPath: /tv
        type: hostPath
    podAnnotations:
      container.apparmor.security.beta.kubernetes.io/sonarr: unconfined
    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      capabilities: {}
