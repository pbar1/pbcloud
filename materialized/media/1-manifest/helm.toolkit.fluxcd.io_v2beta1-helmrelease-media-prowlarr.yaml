apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  chart:
    spec:
      chart: prowlarr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
      version: '*'
  interval: 24h
  values:
    env:
      PGID: 100
      PUID: 1000
      TZ: America/Los_Angeles
    image:
      imagePullPolicy: Always
      repository: ghcr.io/linuxserver/prowlarr
      tag: latest
    ingress:
      main:
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          ingress.kubernetes.io/force-ssl-redirect: "true"
          projectcontour.io/ingress.class: contour-external
        enabled: true
        hosts:
        - host: prowlarr.xnauts.net
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - prowlarr.xnauts.net
          secretName: prowlarr-tls
    persistence:
      config:
        enabled: true
        hostPath: /data/general/config/prowlarr
        mountPath: /config
        type: hostPath
    podAnnotations:
      container.apparmor.security.beta.kubernetes.io/prowlarr: unconfined
    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      capabilities: {}
