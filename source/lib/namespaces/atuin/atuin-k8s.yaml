apiVersion: v1
kind: Secret
metadata:
  name: atuin-secrets
type: Opaque
stringData:
  ATUIN_DB_USERNAME: atuin
  ATUIN_DB_PASSWORD: seriously-insecure
  ATUIN_HOST: "127.0.0.1"
  ATUIN_PORT: "8888"
  ATUIN_OPEN_REGISTRATION: "true"
  ATUIN_DB_URI: "postgres://atuin:seriously-insecure@localhost/atuin"
immutable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atuin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atuin
  template:
    metadata:
      labels:
        app: atuin
    spec:
      containers:
      - args:
        - server
        - start
        env:
        - name: ATUIN_DB_URI
          valueFrom:
            secretKeyRef:
              name: atuin-secrets
              key: ATUIN_DB_URI
              optional: false
        - name: ATUIN_HOST
          value: 0.0.0.0
        - name: ATUIN_PORT
          value: "8888"
        - name: ATUIN_OPEN_REGISTRATION
          value: "true"
        image: ghcr.io/atuinsh/atuin:main
        name: atuin
        ports:
        - containerPort: 8888
      - name: postgresql
        image: postgres:14
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: atuin
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: atuin-secrets
              key: ATUIN_DB_PASSWORD
              optional: false
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: atuin-secrets
              key: ATUIN_DB_USERNAME
              optional: false
        volumeMounts:
        - name: database
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: database
        hostPath:
          path: /zssd/general/atuin-pg
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: atuin
  name: atuin
spec:
  ports:
  - name: "8888"
    port: 8888
  selector:
    app: atuin
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: atuin
subjects:
- name: atuin
tunnelRef:
  kind: ClusterTunnel
  name: xnauts-net-tunnel
