apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        imagePullPolicy: Always
        args:
        - "tunnel"
        - "run"
        env:
        - name: NO_AUTOUPDATE
          value: "true"
        - name: TUNNEL_TOKEN
          value: "eyJhIjoiMTdkODI0YzA3OTliYWI0MTU4ZjNiNzgyMDBkYzQzMjIiLCJ0IjoiODI2ZGVhZjctNWU1My00YWZlLTg5YmQtZDJhNGJkZDdhY2Y4IiwicyI6Ik1UUXhNV0ZpTldJdFpUZGxZaTAwTkRreExUZ3pPV1F0WmprMVlUQXpOekUyWmpoaSJ9"
