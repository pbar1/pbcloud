apiVersion: v1
kind: Namespace
metadata:
  name: knative-serving
---
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: knative-serving
spec:
  ingress:
    contour:
      enabled: true
  config:
    network:
      ingress-class: "contour.ingress.networking.knative.dev"
    domain:
      "xnauts.net": ""
    # TODO: Manually added `default-tls-secret: cert-manager/xnauts-net-tls` to `config-contour` configmap
