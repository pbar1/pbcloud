version: '3'

env:
  GIT_ROOT:
    sh: git rev-parse --show-toplevel || sl root
  PULUMI_CONFIG_PASSPHRASE: ""

tasks:
  default: task --list

  build:
    desc: Build source into materialized configs
    cmds:
    - rm -rf materialized
    - bash scripts/materialize.sh
    # TODO: The following are only for clowntown purposes until migration complete:
    - rm -rf clusters/tec/media
    - cp -r materialized/k8s/tec/media clusters/tec/media
    - rm -rf clusters/tec/flux-system/helm-repos
    - cp -r materialized/k8s/tec/flux-system/helm-repos clusters/tec/flux-system/helm-repos
    - rm -rf clusters/tec/unifi
    - cp -r materialized/k8s/tec/unifi clusters/tec/unifi

  # TODO: All generated CRDs go into the same package; might be useful to
  # separate them by package
  crds:
    desc: Import K8s CRDs to Pulumi
    cmds:
    - rm -rf source/crds/clean source/crds/gen
    - npm run crdclean
    - crd2pulumi --nodejs --nodejsPath=source/crds/gen source/crds/clean/*.yaml

  # FIXME: Convenience putting this here, also exists in clusters/tec
  sync:
    desc: Sync Flux with this Git repo
    cmds:
    - flux reconcile source git flux-system

  pu:
    desc: Build with Pulumi
    cmds:
    - pulumi up
