apiVersion: notification.toolkit.fluxcd.io/v1beta1
kind: Provider
metadata:
  name: discord
  namespace: flux-system
spec:
  type: discord
  channel: tec-infra
  secretRef:
    name: discord-url
---
apiVersion: notification.toolkit.fluxcd.io/v1beta5
kind: Alert
metadata:
  name: test-alert
  namespace: flux-system
spec:
  summary: testing alerts for tec some more
  providerRef:
    name: discord
  eventSeverity: error
  eventSources:
  - kind: GitRepository
    name: '*'
  - kind: Kustomization
    name: '*'
