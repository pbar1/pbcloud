apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
    - dns01:
        cloudflare:
          email: "${EMAIL}"
          apiKeySecretRef:
            name: cloudflare-creds
            key: CF_API_KEY
      selector:
        dnsZones:
        - ${DOMAIN}
