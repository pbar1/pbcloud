apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: transmission
  namespace: media
spec:
  interval: 24h
  chart:
    spec:
      chart: transmission
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/linuxserver/transmission
      tag: latest
      pullPolicy: Always

    env:
      TZ: America/Los_Angeles
      PUID: 1000
      PGID: 100
      TRANSMISSION_DOWNLOAD_DIR: /downloads/transmission/complete
      TRANSMISSION_INCOMPLETE_DIR: /downloads/transmission/incomplete
      TRANSMISSION_INCOMPLETE_DIR_ENABLED: true
      TRANSMISSION_WEB_HOME: ""
      TRANSMISSION_RPC_PASSWORD: ""

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch

    persistence:
      config:
        enabled: true
        type: hostPath
        hostPath: /data/general/config/transmission
        mountPath: /config
      downloads:
        enabled: true
        type: hostPath
        hostPath: /data/torrents/transmission
        mountPath: /downloads/transmission
      shared:
        enabled: true
        mountPath: /shared

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
        - host: "transmission.${DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - "transmission.${DOMAIN}"
          secretName: transmission-tls

    secret:
      PIA_USER: "${PIA_USER}"
      PIA_PASS: "${PIA_PASS}"

    additionalContainers:
      gluetun:
        image: qmcgaw/gluetun
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        env:
        - name: TZ
          value: America/Los_Angeles
        - name: VPN_SERVICE_PROVIDER
          value: private internet access
        - name: OPENVPN_USER
          valueFrom:
            secretKeyRef:
              name: transmission
              key: PIA_USER
        - name: OPENVPN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: transmission
              key: PIA_PASS
        - name: SERVER_REGIONS
          value: Switzerland
        - name: PRIVATE_INTERNET_ACCESS_VPN_PORT_FORWARDING
          value: "on"
        - name: PRIVATE_INTERNET_ACCESS_VPN_PORT_FORWARDING_STATUS_FILE
          value: /shared/forwarded_port
        volumeMounts:
        - name: shared
          mountPath: /shared
      inotify-port:
        image: nixery.dev/shell/inotify-tools/transmission
        command:
        - bash
        - -c
        - |
          set -o nounset -o errexit -o pipefail
          trap 'received signal, exiting; exit' INT TERM
          timeout 60s bash -c 'until [ -f /shared/forwarded_port ]; do echo "Waiting for /shared/forwarded_port"; sleep 5; done'
          echo 'Found /shared/forwarded_port'
          while true; do
            transmission-remote --port $(< /shared/forwarded_port)
            echo "Set Transmission port to:" $(< /shared/forwarded_port)
            inotifywait --event modify /shared/forwarded_port
            echo "Received notification of updated port"
          done
        volumeMounts:
        - name: shared
          mountPath: /shared
