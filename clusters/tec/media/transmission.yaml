apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: transmission
  namespace: media
spec:
  interval: 24h
  chart:
    spec:
      chart: transmission
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    initContainers:
      custom-webui:
        name: custom-webui
        image: curlimages/curl:7.76.1
        command:
        - "/bin/sh"
        - "-c"
        - "curl -o- -sL https://github.com/johman10/flood-for-transmission/releases/download/latest/flood-for-transmission.tar.gz | tar xzf - -C /config"
        volumeMounts:
        - name: config
          mountPath: /config
        securityContext:
          runAsUser: 1000
          runAsGroup: 100

    env:
      TZ: America/Los_Angeles
      TRANSMISSION_WEB_HOME: /config/flood-for-transmission/
      TRANSMISSION_RPC_PASSWORD: transmission
      TRANSMISSION_DOWNLOAD_DIR: /downloads/complete
      TRANSMISSION_INCOMPLETE_DIR: /downloads/incomplete
      TRANSMISSION_INCOMPLETE_DIR_ENABLED: true

    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 100
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault

    persistence:
      config:
        enabled: true
        type: hostPath
        hostPath: /data/general/config/transmission
        mountPath: /config
      downloads:
        enabled: true
        type: hostPath
        hostPath: /data/torrents/transmission
        mountPath: /downloads
      shared:
        enabled: true
        mountPath: /shared

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
        - host: "transmission.${DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - "transmission.${DOMAIN}"
          secretName: transmission-tls

    secret:
      PIA_USER: "${PIA_USER}"
      PIA_PASS: "${PIA_PASS}"

    additionalContainers:
      pia-wireguard:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          privileged: true
        image: ghcr.io/pbar1/pia-wireguard:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: transmission
        env:
        - name: TZ
          value: America/Los_Angeles
        - name: PIA_DNS
          value: "true"
        - name: PIA_PF
          value: "true"
        - name: AUTOCONNECT
          value: "false"
        - name: DISABLE_IPV6
          value: "no"
        - name: PREFERRED_REGION
          value: swiss
        - name: PF_FILE
          value: /shared/forwarded_port
        volumeMounts:
        - name: shared
          mountPath: /shared
      transmission-remote:
        image: kartouch/transmission-remote:latest
        command:
        - sh
        - -c
        - |
          while [ ! -f /shared/forwarded_port ]; do sleep 2; done
          while true; do
            transmission-remote --port $(< /shared/forwarded_port)
            sleep 900
          done
        volumeMounts:
        - name: shared
          mountPath: /shared
