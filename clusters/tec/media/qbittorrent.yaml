apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 24h
  chart:
    spec:
      chart: qbittorrent
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/linuxserver/qbittorrent
      tag: latest
      pullPolicy: Always

    env:
      TZ: America/Los_Angeles
      PUID: 1000
      PGID: 100
      QBT_WEBUI_AUTHSUBNETWHITELISTENABLED: "TRUE"
      QBT_WEBUI_AUTHSUBNETWHITELIST: 0.0.0.0/0

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch

    # FIXME: Enable persistence
    persistence:
      config:
        enabled: false
        type: hostPath
        hostPath: /data/general/config/qbittorrent
        mountPath: /config
      downloads:
        enabled: false
        type: hostPath
        hostPath: /data/torrents/qbittorrent
        mountPath: /downloads

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
        - host: "qbittorrent.${DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - "qbittorrent.${DOMAIN}"
          secretName: qbittorrent-tls
