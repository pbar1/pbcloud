apiVersion: "helm.toolkit.fluxcd.io/v2beta1"
kind: "HelmRelease"
metadata:
  name: "qbittorrent"
  namespace: "media"
spec:
  chart:
    spec:
      chart: "qbittorrent"
      sourceRef:
        kind: "HelmRepository"
        name: "geek-cookbook"
        namespace: "flux-system"
  interval: "24h"
  values:
    additionalContainers:
      gluetun:
        env:
        - name: "FIREWALL_VPN_INPUT_PORTS"
          value: "55487"
        - name: "HEALTH_VPN_DURATION_INITIAL"
          value: "120s"
        - name: "OWNED_ONLY"
          value: "yes"
        - name: "SERVER_CITIES"
          value: "Zurich"
        - name: "TZ"
          value: "America/Los_Angeles"
        - name: "VPN_SERVICE_PROVIDER"
          value: "mullvad"
        - name: "VPN_TYPE"
          value: "wireguard"
        - name: "WIREGUARD_ADDRESSES"
          value: "10.67.247.61/32"
        envFrom:
        - secretRef:
            name: "qbittorrent"
        image: "qmcgaw/gluetun"
        securityContext:
          capabilities:
            add:
            - "NET_ADMIN"
    env:
      PGID: 100
      PUID: 1000
      QBT_TORRENTING_PORT: "55487"
      TZ: "America/Los_Angeles"
    image:
      imagePullPolicy: "Always"
      repository: "ghcr.io/linuxserver/qbittorrent"
      tag: "latest"
    ingress:
      main:
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        enabled: true
        hosts:
        - host: "qbittorrent.${DOMAIN}"
          paths:
          - path: "/"
            pathType: "Prefix"
        tls:
        - hosts:
          - "qbittorrent.${DOMAIN}"
          secretName: "qbittorrent-tls"
    persistence:
      config:
        enabled: true
        hostPath: "/data/general/config/qbittorrent"
        mountPath: "/config"
        type: "hostPath"
      downloads:
        enabled: true
        hostPath: "/data/torrents/qbittorrent"
        mountPath: "/downloads/qbittorrent"
        type: "hostPath"
    podAnnotations:
      container.apparmor.security.beta.kubernetes.io/qbittorrent: "unconfined"
    podSecurityContext:
      capabilities:
        drop:
        - "all"
      fsGroup: 100
      fsGroupChangePolicy: "OnRootMismatch"
      seccompProfile:
        type: "RuntimeDefault"
    secret:
      WIREGUARD_PRIVATE_KEY: "${MULLVAD_WG_PK}"