apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 24h
  chart:
    spec:
      chart: radarr
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/linuxserver/radarr
      tag: latest
      pullPolicy: Always

    env:
      TZ: America/Los_Angeles
      PUID: 1000
      PGID: 100

    podAnnotations:
      # FIXME: failed to get container spec opts: failed to generate apparmor spec opts: apparmor is not supported
      container.apparmor.security.beta.kubernetes.io/radarr: unconfined

    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
      capabilities:
        drop:
        - all
      seccompProfile:
        type: RuntimeDefault

    persistence:
      config:
        enabled: true
        type: hostPath
        hostPath: /data/general/config/radarr
        mountPath: /config
      media:
        enabled: true
        type: hostPath
        hostPath: /data/media/movies
        mountPath: /movies
      downloads:
        enabled: true
        type: hostPath
        hostPath: /data/torrents
        mountPath: /downloads

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
        - host: "radarr.${DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - "radarr.${DOMAIN}"
          secretName: radarr-tls
