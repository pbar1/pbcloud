apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: whisparr
  namespace: download
spec:
  interval: 24h
  chart:
    spec:
      chart: whisparr
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  values:
    persistence:
      config:
        enabled: false

    ingress:
      main:
        enabled: true
        hosts:
        - host: "{{ .Release.Name }}.${DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - secretName: "{{ .Release.Name }}-tls"
          hosts:
          - "{{ .Release.Name }}.${DOMAIN}"
