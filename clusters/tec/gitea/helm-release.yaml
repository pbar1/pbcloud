apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 24h
  chart:
    spec:
      chart: gitea
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
  values:
    image:
      pullPolicy: IfNotPresent

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
      - host: "gitea.${DOMAIN}"
        paths:
        - path: /
          pathType: Prefix
      tls:
      - hosts:
        - "gitea.${DOMAIN}"
        secretName: gitea-tls

    persistence:
      enabled: true
      storageClass: local-path

    gitea:
      config:
        server:
          DISABLE_SSH: true

    postgresql:
      enabled: false

    memcached:
      enabled: false
